<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>sync</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;

      opacity: 0;
      animation: subir 1.2s ease forwards;
    }

    h1 {
      margin-top: 20px;
      font-size: 30px;
      font-weight: normal;
      letter-spacing: 3px;

      opacity: 0;
      animation: subir 1.2s ease forwards;
      animation-delay: 0.5s;
    }

    p {
      margin-top: 5px;
      font-size: 14px;
      color: #aaa;
      letter-spacing: 2px;

      opacity: 0;
      animation: subir 1.2s ease forwards;
      animation-delay: 1s;
    }

    @keyframes subir {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="foto.jpg" alt="foto de perfil">
    <h1>sync</h1>
    <p>das mulher</p>
  </div>

</body>
</html>
