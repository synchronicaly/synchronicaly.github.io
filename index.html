<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Site</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;

      /* AUMENTA TUDO */
      font-size: 3em;
    }

    .container {
      text-align: center;

      /* aumenta tudo mais ainda */
      transform: scale(1.5);
    }

    img {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
    }

    h1 {
      margin-top: 20px;
      color: white;
    }

    p {
      color: #aaa;
      letter-spacing: 3px;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="foto.jpg" alt="foto de perfil">
    <h1>sync</h1>
    <p>das mulher</p>
  </div>
</body>
</html>
